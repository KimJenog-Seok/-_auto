name: Run main2.py daily (KST)

on:
  schedule:
    # 매일 04:04 KST = 매일 19:04 UTC
    - cron: "4 19 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium pandas gspread google-auth google-auth-oauthlib
          pip install openai

      - name: Run main2.py with Retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 60    # ⭐ 요청하신 대로 60분 설정
          max_attempts: 3
          retry_on: error
          command: python main2.py
        env:
          KEY1: ${{ secrets.KEY1 }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # 👇 여기서부터 새로 추가된 부분입니다 👇
      - name: Upload debug files (Screenshots & HTML)
        if: always()             # 앞선 실행이 실패하더라도 무조건 실행되게 만듭니다
        uses: actions/upload-artifact@v4
        with:
          name: debug-files      # 다운로드될 압축파일의 이름입니다
          path: |
            *.png
            *.html
